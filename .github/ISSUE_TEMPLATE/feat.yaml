name: "🚀 Feature Request"
description: 새로운 기능 개발을 위한 이슈를 생성합니다.
title: "[feat] "
labels: ["feat"]
assignees: []

body:
  - type: textarea
    id: feature_description
    attributes:
      label: "🚀 기능 설명"
      description: "어떤 기능이고 왜 필요한지 간결하게 작성해주세요."
      placeholder: "예: 작가 전시 프로필 공통 컴포넌트를 생성합니다."
    validations:
      required: true

  - type: textarea
    id: checklist
    attributes:
      label: "✅ 할 일 (CheckList)"
      description: "기능 개발을 위해 완료해야 할 작업들을 리스트로 적어주세요."
      value: |
        - [ ]
    validations:
      required: true

  - type: textarea
    id: reference
    attributes:
      label: "🔗 참고 사항 (선택)"
      description: "관련 문서, 스크린샷, 또는 예시 등이 있다면 여기에 첨부해주세요."
      placeholder: "Figma 링크나 관련 스크린샷을 이곳에 드래그 앤 드롭 하세요."
    validations:
      required: false
